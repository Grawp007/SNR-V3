# SNR V3 — on-prem deployment.
#   1. Copy .env.example → .env and set JWT_SECRET, ALLOWED_ORIGINS, an LLM key,
#      POSTGRES_PASSWORD, and A2N_ADMIN_EMAIL / A2N_ADMIN_PASSWORD (first-run admin).
#   2. Set SNR_DOMAIN in .env (or edit deploy/Caddyfile) for TLS.
#   3. docker compose up -d
#
# The `app` container serves the API + built UI on :3001 (internal). `caddy`
# terminates TLS and reverse-proxies to it. `postgres` is the V3 data store. To
# front SNR with your OWN proxy instead, remove the caddy service and publish
# app's port directly.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-snr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-snr}
    volumes:
      - snr-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snr} -d ${POSTGRES_DB:-snr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    image: snr-v3:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      # Postgres connection. Compose injects the password from .env.
      DATABASE_URL: postgres://${POSTGRES_USER:-snr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-snr}
      BACKUP_DIR: /data/backups
      # Behind the caddy proxy → trust 1 hop for real client IPs / rate limiting
      TRUST_PROXY: "1"
    volumes:
      - snr-data:/data          # scheduled pg_dump backups persist here
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      SNR_DOMAIN: ${SNR_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  snr-pgdata:
  snr-data:
  caddy-data:
  caddy-config:
