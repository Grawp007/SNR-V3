name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: snr
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: snr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U snr -d snr_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint (advisory — pre-existing debt; does not block)
        run: npx eslint . || true
        continue-on-error: true
      - name: Test (unit + Postgres integration)
        run: npm test
        env:
          TEST_DATABASE_URL: postgres://snr:ci@localhost:5432/snr_test
          JWT_SECRET: ci-test-secret
      - name: Build frontend
        run: npm run build
      - name: Docker build (smoke)
        run: docker build -t snr-v3:ci .
